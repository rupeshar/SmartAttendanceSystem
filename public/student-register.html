<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Smart Attendance</title>
    <link rel="stylesheet" href="css/styles.css?v=2.0">
    <style>
        .register-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }
        .register-card {
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px) saturate(180%);
            position: relative;
            overflow: hidden;
        }
        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
        }
        .register-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .register-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
        }
        .alert-box {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            border: 1px solid transparent;
        }
        .alert-box-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .alert-box-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/><rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/></svg>
                </div>
                <span>Smart<span class="gradient-text">Attendance</span></span>
            </a>
            <nav>
                <a href="index.html" id="nav-home">Home</a>
                <a href="admin.html" id="nav-admin">Admin</a>
                <a href="faculty.html" id="nav-faculty">Faculty</a>
                <a href="student.html" id="nav-student" class="active">Student</a>
            </nav>
        </div>
    </header>

    <main class="register-container">
        <div class="register-card">
            <div id="register-alert" class="alert-box"></div>

            <h1 class="register-title">Student Registration</h1>
            <p class="register-subtitle">Submit your details to request attendance check-in access.</p>
            
            <form id="form-student-register">
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="student-roll">Roll Number / ID</label>
                    <input type="text" id="student-roll" class="input-field" placeholder="e.g. 101" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.75rem;">
                    <label for="student-name">Full Name</label>
                    <input type="text" id="student-name" class="input-field" placeholder="e.g. Rupesh Kumar" required>
                </div>
                <button type="submit" class="btn btn-secondary" style="width: 100%;">
                    📝 Request Access
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                Already approved? <a href="student.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Go to Student Portal</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Smart Attendance Management System. All rights reserved.</p>
    </footer>

    <script src="js/student-register.js"></script>
</body>
</html>
