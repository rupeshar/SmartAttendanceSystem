<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Smart Attendance</title>
    <link rel="stylesheet" href="css/styles.css?v=2.0">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }
        .auth-card {
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: var(--bg-card);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px) saturate(180%);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        .auth-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .auth-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-alert {
            display: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            border: 1px solid transparent;
        }
        .auth-alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .auth-alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/><rect x="7" y="14" width="3" height="3"/><rect x="14" y="14" width="3" height="3"/></svg>
                </div>
                <span>Smart<span class="gradient-text">Attendance</span></span>
            </a>
            <nav>
                <a href="index.html" id="nav-home">Home</a>
                <a href="admin.html" id="nav-admin" class="active">Admin</a>
                <a href="faculty.html" id="nav-faculty">Faculty</a>
                <a href="student.html" id="nav-student">Student</a>
            </nav>
        </div>
    </header>

    <main class="auth-container clay-theme">
        <div class="auth-card">
            <div id="auth-alert" class="auth-alert"></div>

            <h1 class="auth-title">Admin Sign In</h1>
            <p class="auth-subtitle">Verify faculty & student registrations.</p>
            
            <form id="form-admin-login">
                <div class="form-group" style="margin-bottom: 1.25rem;">
                    <label for="admin-username">Admin Username</label>
                    <input type="text" id="admin-username" class="input-field" placeholder="e.g. rupesh" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.75rem;">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    🔒 Login as Admin
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Smart Attendance Management System. All rights reserved.</p>
    </footer>

    <script src="js/admin-auth.js?v=2.0"></script>
</body>
</html>
